groups:
  - name: node_alerts
    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "CPU alta no servidor"
          description: "CPU acima de 80% por mais de 1 minuto."

      - alert: LowMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Memória baixa"
          description: "Menos de 20% de memória disponível."

      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Servico fora do ar"
          description: "O servico esta indisponivel"
