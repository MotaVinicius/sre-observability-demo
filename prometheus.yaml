global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'node-app'
    static_configs:
      - targets:
          - example-app:9100

  - job_name: Prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: Docker
    static_configs:
      - targets:
          - host.docker.internal:9323